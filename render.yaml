services:
  - type: web
    name: quizia-backend
    env: java
    plan: free
    rootDir: quizia_backend
    runtime: java-21
    buildCommand: cd quizia_backend && ./gradlew clean build -x test
    startCommand: java -jar quizia_backend/build/libs/quizia_backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: 8080