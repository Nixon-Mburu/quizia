services:
  - type: web
    name: quizia-backend
    env: docker
    plan: free
    rootDir: quizia_backend
    dockerfilePath: quizia_backend/Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: 8080